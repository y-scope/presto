name: integration-tests

# ==============================================================================
# Integration Tests
# ==============================================================================
# End-to-end tests that run the Java coordinator with the C++ native worker.
#
# These tests verify that the Java coordinator and C++ native worker work together
# correctly. They require artifacts from both:
# - presto-java8: presto-server tarball (Java coordinator)
# - prestocpp: presto_server binary (C++ native worker)
#
# Test Categories:
# ----------------
# - integration-e2e-java: End-to-end tests (TestPrestoNative*.java)
# - integration-storage-java: Storage format tests (PARQUET, DWRF)
# - integration-sidecar-java: Sidecar plugin tests
#
# Adapted from upstream's prestocpp-linux-build-and-unit-test.yml jobs:
# - prestocpp-linux-presto-e2e-tests      -> integration-e2e-java
# - prestocpp-linux-presto-native-tests   -> integration-storage-java
# - prestocpp-linux-presto-sidecar-tests  -> integration-sidecar-java
#
# Key differences from upstream:
# 1. Uses pre-built presto-server artifact instead of building from source
#    (upstream runs: ./mvnw install -pl 'presto-native-execution' -am)
# 2. Uses unified builder image with pre-cached Maven dependencies
# 3. Artifact download path handling differs due to actions/download-artifact@v4
#    stripping common path prefixes
# 4. Adds PRESTO_SERVER_DIR and additionalClasspath for presto-server JARs
# 5. Sets LD_LIBRARY_PATH explicitly for native library discovery

on:
  workflow_call:
    inputs:
      builder-image:
        description: 'Full builder image URI with tag'
        required: true
        type: string
      presto-artifacts-image:
        description: 'Docker image containing presto build artifacts'
        required: true
        type: string
      prestocpp-artifacts-image:
        description: 'Docker image containing prestocpp build artifacts'
        required: true
        type: string

jobs:
  # Upstream: prestocpp-linux-presto-e2e-tests
  # Tests: TestPrestoNative*.java in presto-native-execution module
  # Parallelized by test category for faster execution
  integration-e2e-java:
    if: false  # Temporarily disabled
    name: "integration-e2e-java (${{ matrix.group }})"
    runs-on: &runner >-
      ${{
        github.repository_owner == 'y-scope'
        && fromJSON('["self-hosted", "x64", "ubuntu-noble"]')
        || 'ubuntu-latest'
      }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: iceberg
            test-pattern: "TestPrestoNativeIceberg*"
          - group: tpch-tpcds
            test-pattern: "TestPrestoNativeTpc*"
          - group: general
            # All TestPrestoNative* except iceberg and tpch-tpcds
            test-pattern: "TestPrestoNative*,!TestPrestoNativeIceberg*,!TestPrestoNativeTpc*"
    env:
      MAVEN_OPTS: "-Xmx4G -XX:+ExitOnOutOfMemoryError"
      MAVEN_TEST: "-B -Dair.check.skip-all -Dmaven.javadoc.skip=true -DLogTestDurationListener.enabled=true --fail-at-end"
      # Local Maven repo shared between docker runs
      MAVEN_LOCAL_REPO: ${{ github.workspace }}/.m2/repository
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: registry-private.yscope.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Seed local Maven repo from container's cached repo
      - name: Initialize Maven repository
        run: |
          mkdir -p ${{ env.MAVEN_LOCAL_REPO }}
          # Copy cached Maven repo from builder image to local directory
          CONTAINER_ID=$(docker create ${{ inputs.builder-image }})
          docker cp "${CONTAINER_ID}:/opt/maven/repository/." ${{ env.MAVEN_LOCAL_REPO }}/ || true
          docker rm "${CONTAINER_ID}"
          echo "Maven repository initialized"

      # Pull artifacts from Docker registry instead of GitHub artifacts
      - name: Download prestocpp artifacts from registry
        run: |
          echo "Pulling prestocpp artifact image: ${{ inputs.prestocpp-artifacts-image }}"
          docker pull "${{ inputs.prestocpp-artifacts-image }}"

          # Extract artifacts from image
          mkdir -p presto-native-execution/_build/release
          CONTAINER_ID=$(docker create "${{ inputs.prestocpp-artifacts-image }}")
          docker cp "${CONTAINER_ID}:/artifacts/." presto-native-execution/_build/release/
          docker rm "${CONTAINER_ID}"

          # Restore execute permissions
          chmod +x presto-native-execution/_build/release/presto_cpp/main/presto_server
          chmod +x presto-native-execution/_build/release/velox/velox/functions/remote/server/velox_functions_remote_server_main || true

          echo "prestocpp artifacts extracted:"
          ls -lh presto-native-execution/_build/release/presto_cpp/main/presto_server

      - name: Download presto artifacts from registry
        run: |
          echo "Pulling presto artifact image: ${{ inputs.presto-artifacts-image }}"
          docker pull "${{ inputs.presto-artifacts-image }}"

          # Extract artifacts from image
          CONTAINER_ID=$(docker create "${{ inputs.presto-artifacts-image }}")
          docker cp "${CONTAINER_ID}:/artifacts/." ./
          docker rm "${CONTAINER_ID}"

          # Extract presto-server tarball
          PRESTO_SERVER_TAR=$(ls presto-server-*.tar.gz)
          tar -xzf ${PRESTO_SERVER_TAR}
          PRESTO_SERVER_DIR=$(ls -d presto-server-*/ | head -1 | sed 's:/$::')
          echo "Presto server extracted to ${PRESTO_SERVER_DIR}/"
          echo "PRESTO_SERVER_DIR=${{ github.workspace }}/${PRESTO_SERVER_DIR}" >> $GITHUB_ENV

      # YScope-specific: presto-clp is not in upstream, required for CLP UDF tests
      - name: Build required dependencies
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e MAVEN_OPTS="-Xmx2G -XX:+ExitOnOutOfMemoryError -Dmaven.repo.local=/workspace/.m2/repository" \
            ${{ inputs.builder-image }} \
            ./mvnw install -B -DskipTests -Dair.check.skip-all -Dmaven.javadoc.skip=true \
              --no-transfer-progress -pl 'presto-clp'

      - name: Compile integration test classes
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e MAVEN_OPTS="-Xmx2G -XX:+ExitOnOutOfMemoryError -Dmaven.repo.local=/workspace/.m2/repository" \
            ${{ inputs.builder-image }} \
            ./mvnw test-compile -pl 'presto-native-execution'

      - name: Run presto-native e2e tests
        run: |
          # First verify the binary exists at expected location
          PRESTO_SERVER_PATH="${{ github.workspace }}/presto-native-execution/_build/release/presto_cpp/main/presto_server"
          if [ ! -f "${PRESTO_SERVER_PATH}" ]; then
            echo "ERROR: presto_server binary not found at: ${PRESTO_SERVER_PATH}"
            ls -la ${{ github.workspace }}/presto-native-execution/_build/release/ || echo "Directory not found"
            exit 1
          fi
          echo "Found presto_server binary at: ${PRESTO_SERVER_PATH}"
          echo "Running test pattern: ${{ matrix.test-pattern }}"

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ runner.temp }}:/tmp/runner" \
            -w /workspace \
            -e MAVEN_OPTS="${MAVEN_OPTS} -Dmaven.repo.local=/workspace/.m2/repository" \
            -e LD_LIBRARY_PATH="/usr/local/lib:/usr/local/lib64:/usr/lib/x86_64-linux-gnu" \
            ${{ inputs.builder-image }} \
            ./mvnw test \
              ${MAVEN_TEST} \
              -pl 'presto-native-execution' \
              -Dtest="${{ matrix.test-pattern }}" \
              -DPRESTO_SERVER=/workspace/presto-native-execution/_build/release/presto_cpp/main/presto_server \
              -DPRESTO_SERVER_DIR=/workspace/${PRESTO_SERVER_DIR#${{ github.workspace }}/} \
              -DDATA_DIR=/tmp/runner \
              -Duser.timezone=America/Bahia_Banderas \
              -DadditionalClasspath="/workspace/${PRESTO_SERVER_DIR#${{ github.workspace }}/}/plugin/*:/workspace/${PRESTO_SERVER_DIR#${{ github.workspace }}/}/lib/*" \
              -T1C

  # Upstream: prestocpp-linux-presto-native-tests
  # Tests: Test*.java in presto-native-tests module with storage format matrix
  integration-storage-java:
    if: false  # Temporarily disabled
    name: "integration-storage-java"
    runs-on: *runner
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        storage-format: ["PARQUET", "DWRF"]
    env:
      MAVEN_OPTS: "-Xmx4G -XX:+ExitOnOutOfMemoryError"
      MAVEN_TEST: "-B -Dair.check.skip-all -Dmaven.javadoc.skip=true -DLogTestDurationListener.enabled=true --fail-at-end"
      MAVEN_LOCAL_REPO: ${{ github.workspace }}/.m2/repository
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: registry-private.yscope.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Seed local Maven repo from container's cached repo
      - name: Initialize Maven repository
        run: |
          mkdir -p ${{ env.MAVEN_LOCAL_REPO }}
          CONTAINER_ID=$(docker create ${{ inputs.builder-image }})
          docker cp "${CONTAINER_ID}:/opt/maven/repository/." ${{ env.MAVEN_LOCAL_REPO }}/ || true
          docker rm "${CONTAINER_ID}"
          echo "Maven repository initialized"

      # Pull artifacts from Docker registry instead of GitHub artifacts
      - name: Download prestocpp artifacts from registry
        run: |
          echo "Pulling prestocpp artifact image: ${{ inputs.prestocpp-artifacts-image }}"
          docker pull "${{ inputs.prestocpp-artifacts-image }}"

          # Extract artifacts from image
          mkdir -p presto-native-execution/_build/release
          CONTAINER_ID=$(docker create "${{ inputs.prestocpp-artifacts-image }}")
          docker cp "${CONTAINER_ID}:/artifacts/." presto-native-execution/_build/release/
          docker rm "${CONTAINER_ID}"

          # Restore execute permissions
          chmod +x presto-native-execution/_build/release/presto_cpp/main/presto_server
          chmod +x presto-native-execution/_build/release/velox/velox/functions/remote/server/velox_functions_remote_server_main || true

          echo "prestocpp artifacts extracted:"
          ls -lh presto-native-execution/_build/release/presto_cpp/main/presto_server

      - name: Download presto artifacts from registry
        run: |
          echo "Pulling presto artifact image: ${{ inputs.presto-artifacts-image }}"
          docker pull "${{ inputs.presto-artifacts-image }}"

          # Extract artifacts from image
          CONTAINER_ID=$(docker create "${{ inputs.presto-artifacts-image }}")
          docker cp "${CONTAINER_ID}:/artifacts/." ./
          docker rm "${CONTAINER_ID}"

          # Extract presto-server tarball
          PRESTO_SERVER_TAR=$(ls presto-server-*.tar.gz)
          tar -xzf ${PRESTO_SERVER_TAR}
          PRESTO_SERVER_DIR=$(ls -d presto-server-*/ | head -1 | sed 's:/$::')
          echo "Presto server extracted to ${PRESTO_SERVER_DIR}/"
          echo "PRESTO_SERVER_DIR=${{ github.workspace }}/${PRESTO_SERVER_DIR}" >> $GITHUB_ENV

      - name: Compile integration test classes
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e MAVEN_OPTS="-Xmx2G -XX:+ExitOnOutOfMemoryError -Dmaven.repo.local=/workspace/.m2/repository" \
            ${{ inputs.builder-image }} \
            ./mvnw test-compile -pl 'presto-native-tests'

      - name: Run presto-native tests
        run: |
          # First verify the binary exists at expected location
          PRESTO_SERVER_PATH="${{ github.workspace }}/presto-native-execution/_build/release/presto_cpp/main/presto_server"
          if [ ! -f "${PRESTO_SERVER_PATH}" ]; then
            echo "ERROR: presto_server binary not found at: ${PRESTO_SERVER_PATH}"
            ls -la ${{ github.workspace }}/presto-native-execution/_build/release/ || echo "Directory not found"
            exit 1
          fi
          echo "Found presto_server binary at: ${PRESTO_SERVER_PATH}"

          # Find test classes
          TESTFILES=$(find ./presto-native-tests/src/test -type f -name 'Test*.java')
          TESTCLASSES=""
          for test_file in $TESTFILES; do
            tmp=${test_file##*/}
            test_class=${tmp%%\.*}
            TESTCLASSES="${TESTCLASSES},${test_class}"
          done
          TESTCLASSES=${TESTCLASSES#,}
          echo "TESTCLASSES = $TESTCLASSES"

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ runner.temp }}:/tmp/runner" \
            -w /workspace \
            -e MAVEN_OPTS="${MAVEN_OPTS} -Dmaven.repo.local=/workspace/.m2/repository" \
            -e LD_LIBRARY_PATH="/usr/local/lib:/usr/local/lib64:/usr/lib/x86_64-linux-gnu" \
            ${{ inputs.builder-image }} \
            ./mvnw test \
              ${MAVEN_TEST} \
              -pl 'presto-native-tests' \
              -DstorageFormat=${{ matrix.storage-format }} \
              -Dtest="${TESTCLASSES}" \
              -DPRESTO_SERVER=/workspace/presto-native-execution/_build/release/presto_cpp/main/presto_server \
              -DPRESTO_SERVER_DIR=/workspace/${PRESTO_SERVER_DIR#${{ github.workspace }}/} \
              -DDATA_DIR=/tmp/runner \
              -Duser.timezone=America/Bahia_Banderas \
              -DadditionalClasspath="/workspace/${PRESTO_SERVER_DIR#${{ github.workspace }}/}/plugin/*:/workspace/${PRESTO_SERVER_DIR#${{ github.workspace }}/}/lib/*" \
              -T1C

  # Upstream: prestocpp-linux-presto-sidecar-tests
  # Tests: Test*.java in presto-native-sidecar-plugin module
  integration-sidecar-java:
    if: false  # Temporarily disabled
    name: "integration-sidecar-java"
    runs-on: *runner
    timeout-minutes: 180
