          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Seed local Maven repo from container's cached repo
      - name: Initialize Maven repository
        run: |
          mkdir -p ${{ env.MAVEN_LOCAL_REPO }}
          CONTAINER_ID=$(docker create ${{ inputs.builder-image }})
          docker cp "${CONTAINER_ID}:/opt/maven/repository/." ${{ env.MAVEN_LOCAL_REPO }}/ || true
          docker rm "${CONTAINER_ID}"
          echo "Maven repository initialized"

      # Pull artifacts from Docker registry instead of GitHub artifacts
      - name: Download prestocpp artifacts from registry
        run: |
          echo "Pulling prestocpp artifact image: ${{ inputs.prestocpp-artifacts-image }}"
          docker pull "${{ inputs.prestocpp-artifacts-image }}"

          # Extract artifacts from image
          mkdir -p presto-native-execution/_build/release
          CONTAINER_ID=$(docker create "${{ inputs.prestocpp-artifacts-image }}")
          docker cp "${CONTAINER_ID}:/artifacts/." presto-native-execution/_build/release/
          docker rm "${CONTAINER_ID}"

          # Restore execute permissions
          chmod +x presto-native-execution/_build/release/presto_cpp/main/presto_server
          chmod +x presto-native-execution/_build/release/velox/velox/functions/remote/server/velox_functions_remote_server_main || true

          echo "prestocpp artifacts extracted:"
          ls -lh presto-native-execution/_build/release/presto_cpp/main/presto_server

      - name: Download presto artifacts from registry
        run: |
          echo "Pulling presto artifact image: ${{ inputs.presto-artifacts-image }}"
          docker pull "${{ inputs.presto-artifacts-image }}"

          # Extract artifacts from image
          CONTAINER_ID=$(docker create "${{ inputs.presto-artifacts-image }}")
          docker cp "${CONTAINER_ID}:/artifacts/." ./
          docker rm "${CONTAINER_ID}"

          # Extract presto-server tarball
          PRESTO_SERVER_TAR=$(ls presto-server-*.tar.gz)
          tar -xzf ${PRESTO_SERVER_TAR}
          PRESTO_SERVER_DIR=$(ls -d presto-server-*/ | head -1 | sed 's:/$::')
          echo "Presto server extracted to ${PRESTO_SERVER_DIR}/"
          echo "PRESTO_SERVER_DIR=${{ github.workspace }}/${PRESTO_SERVER_DIR}" >> $GITHUB_ENV

      # YScope-specific: presto-clp is not in upstream, required for CLP UDF tests
      - name: Build required dependencies
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e MAVEN_OPTS="-Xmx2G -XX:+ExitOnOutOfMemoryError -Dmaven.repo.local=/workspace/.m2/repository" \
            ${{ inputs.builder-image }} \
            ./mvnw install -B -DskipTests -Dair.check.skip-all -Dmaven.javadoc.skip=true \
              --no-transfer-progress -pl 'presto-clp'

      - name: Compile integration test classes
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e MAVEN_OPTS="-Xmx2G -XX:+ExitOnOutOfMemoryError -Dmaven.repo.local=/workspace/.m2/repository" \
            ${{ inputs.builder-image }} \
            ./mvnw test-compile -pl 'presto-native-sidecar-plugin'

      - name: Run presto-native sidecar tests
        run: |
          # First verify the binary exists at expected location
          PRESTO_SERVER_PATH="${{ github.workspace }}/presto-native-execution/_build/release/presto_cpp/main/presto_server"
          if [ ! -f "${PRESTO_SERVER_PATH}" ]; then
