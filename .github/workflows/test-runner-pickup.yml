name: Test Runner Pickup

on:
  workflow_dispatch:
  push:
    branches:
      - ci-test

jobs:
  simple-test:
    runs-on: Default
    steps:
      - name: Echo test
        run: |
          echo "Runner picked up the job!"
          echo "Hostname: $(hostname)"
          echo "Date: $(date)"
          echo "User: $(whoami)"
