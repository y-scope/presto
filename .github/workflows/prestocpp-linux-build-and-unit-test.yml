name: prestocpp-linux-build-and-unit-test

# ==============================================================================
# Prestocpp (C++ Native Worker) Build, Tests, and Image
# ==============================================================================
# This workflow builds the C++ native worker (prestocpp), runs unit tests, and
# builds the prestissimo runtime Docker image.
#
# What is Prestocpp/Prestissimo?
# ------------------------------
# - Prestocpp: The C++ source code for the native Presto worker
# - Prestissimo: The runtime/deployment name for the compiled C++ worker
#
# Job Dependency Graph:
# ---------------------
#   prestocpp-linux-build-and-test ─► prestissimo-image
#
# Build Strategy:
# ---------------
# Uses a pre-built Docker image ("builder image") with:
# - All C++ dependencies pre-installed (boost, folly, glog, etc.)
# - Pre-warmed ccache containing compiled object files from a previous build

on:
  workflow_call:
    inputs:
      builder-image:
        description: 'Full builder image URI with tag'
        required: true
        type: string
      runtime-version-tag:
        description: 'Immutable runtime image tag (e.g., 0.293-BETA-20250529140509-484b00e)'
        required: false
        default: ''
        type: string
      runtime-snapshot-tag:
        description: 'Mutable SNAPSHOT tag (e.g., 0.293-BETA-SNAPSHOT)'
        required: false
        default: ''
        type: string
    outputs:
      prestocpp-artifacts-image:
        description: "Docker image containing prestocpp build artifacts"
        value: ${{ jobs.prestocpp-linux-build-and-test.outputs.artifacts-image }}

# Note: concurrency is handled by the parent ci.yml workflow

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: Build and Test Prestocpp
  # ----------------------------------------------------------------------------
  # Builds the prestocpp binary, runs unit tests, and pushes artifacts to registry.
  prestocpp-linux-build-and-test:
    name: "prestocpp-linux-build-and-test"
    runs-on: &runner >-
      ${{
        github.repository_owner == 'y-scope'
        && fromJSON('["self-hosted", "x64", "ubuntu-noble"]')
        || 'ubuntu-latest'
      }}
    timeout-minutes: 180
    outputs:
      artifacts-image: ${{ steps.artifacts.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: registry-private.yscope.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Update velox submodule
        run: |
          cd presto-native-execution
          git submodule update --init --recursive --depth=1 velox || \
          git submodule update --init --recursive velox

      - name: Build engine and run tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e CCACHE_DIR=/var/cache/ccache \
            -e CCACHE_BASEDIR=/workspace \
            ${{ inputs.builder-image }} \
            bash -c '
              set -e
              git config --global --add safe.directory /workspace

              cd presto-native-execution
              cmake \
                -B _build/release \
                -GNinja \
                -DTREAT_WARNINGS_AS_ERRORS=1 \
                -DENABLE_ALL_WARNINGS=1 \
                -DCMAKE_BUILD_TYPE=Release \
                -DPRESTO_ENABLE_PARQUET=ON \
                -DPRESTO_ENABLE_REMOTE_FUNCTIONS=ON \
                -DPRESTO_ENABLE_JWT=ON \
                -DPRESTO_STATS_REPORTER_TYPE=PROMETHEUS \
                -DPRESTO_MEMORY_CHECKER_TYPE=LINUX_MEMORY_CHECKER \
                -DCMAKE_PREFIX_PATH=/usr/local \
                -DThrift_ROOT=/usr/local \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DMAX_LINK_JOBS=4
              ninja -C _build/release -j $(getconf _NPROCESSORS_ONLN)

              echo "=== ccache statistics ==="
              ccache -s

              echo "=== Running unit tests ==="
              ldconfig /usr/local/lib
              cd _build/release
              ctest -j $(getconf _NPROCESSORS_ONLN) -VV --output-on-failure --exclude-regex velox.*
            '

      # Push artifacts to Docker registry instead of GitHub artifacts
      - name: Push artifacts to registry
        id: artifacts
        run: |
          # Prepare artifact staging directory
          mkdir -p /tmp/prestocpp-artifacts/presto_cpp/main
          mkdir -p /tmp/prestocpp-artifacts/velox/velox/functions/remote/server

          cp presto-native-execution/_build/release/presto_cpp/main/presto_server \
             /tmp/prestocpp-artifacts/presto_cpp/main/

          # Copy velox remote server if it exists
          if [ -f presto-native-execution/_build/release/velox/velox/functions/remote/server/velox_functions_remote_server_main ]; then
            cp presto-native-execution/_build/release/velox/velox/functions/remote/server/velox_functions_remote_server_main \
               /tmp/prestocpp-artifacts/velox/velox/functions/remote/server/
          fi

          # Build and push artifact image
          ARTIFACT_IMAGE="registry-private.yscope.io/${{ github.repository }}/artifacts/prestocpp:${{ github.sha }}"
          docker build -t "${ARTIFACT_IMAGE}" -f .github/dockerfiles/artifacts.dockerfile /tmp/prestocpp-artifacts
          docker push "${ARTIFACT_IMAGE}"

          echo "image=${ARTIFACT_IMAGE}" >> $GITHUB_OUTPUT
          echo "Pushed artifact image: ${ARTIFACT_IMAGE}"

  # ----------------------------------------------------------------------------
  # Job 2: Build Prestissimo Runtime Image
  # ----------------------------------------------------------------------------
  # Downloads the pre-built binary and packages it into a minimal Docker image.
  # The runtime image contains only the binary and runtime dependencies (no build tools).
  prestissimo-image:
    name: "prestissimo-image"
    needs: prestocpp-linux-build-and-test
    runs-on: *runner
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: registry-private.yscope.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Pull artifacts from Docker registry instead of GitHub artifacts
      - name: Download artifacts from registry
        run: |
          ARTIFACT_IMAGE="${{ needs.prestocpp-linux-build-and-test.outputs.artifacts-image }}"
          echo "Pulling artifact image: ${ARTIFACT_IMAGE}"
          docker pull "${ARTIFACT_IMAGE}"

          # Extract artifacts from image to expected path
          mkdir -p presto-native-execution/_build/release
          CONTAINER_ID=$(docker create "${ARTIFACT_IMAGE}")
          docker cp "${CONTAINER_ID}:/artifacts/." presto-native-execution/_build/release/
          docker rm "${CONTAINER_ID}"

          # Restore execute permissions
          chmod +x presto-native-execution/_build/release/presto_cpp/main/presto_server
          chmod +x presto-native-execution/_build/release/velox/velox/functions/remote/server/velox_functions_remote_server_main || true

          echo "Artifacts extracted:"
          ls -lh presto-native-execution/_build/release/presto_cpp/main/presto_server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push prestissimo runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./presto-native-execution/scripts/dockerfiles/prestissimo-runtime.dockerfile
          build-args: |
            BUILDER_IMAGE=${{ inputs.builder-image }}
          push: ${{ github.event_name != 'pull_request' }}
          # Two tags passed from config job:
          # 1. runtime-version-tag: Immutable (e.g., 0.293-BETA-20250529140509-484b00e)
          # 2. runtime-snapshot-tag: Mutable (e.g., 0.293-BETA-SNAPSHOT)
          tags: |
            registry-private.yscope.io/${{ github.repository }}/prestissimo:${{ inputs.runtime-version-tag }}
            registry-private.yscope.io/${{ github.repository }}/prestissimo:${{ inputs.runtime-snapshot-tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
